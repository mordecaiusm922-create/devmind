services:
  - type: web
    name: devmind-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: API_KEYS
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: RATE_LIMIT_REQUESTS
        value: "20"
      - key: RATE_LIMIT_WINDOW_S
        value: "60"
      - key: ANALYSIS_TIMEOUT_S
        value: "120"
