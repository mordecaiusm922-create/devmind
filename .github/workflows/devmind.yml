name: DevMind PR Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Analyze PR with DevMind
        id: devmind
        run: |
          RESPONSE=$(curl -s -X POST "${{ secrets.DEVMIND_API_URL }}/analyze-pr" \
            -H "Content-Type: application/json" \
            -H "X-Api-Key: ${{ secrets.DEVMIND_API_KEY }}" \
            -d "{\"repo\": \"${{ github.repository }}\", \"pr_number\": ${{ github.event.pull_request.number }}}")
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT

      - name: Post comment
        uses: actions/github-script@v7
        with:
          script: |
            const raw = `${{ steps.devmind.outputs.response }}`;
            const data = JSON.parse(raw);
            const s = data.summary;
            const risk = s.risk || {};
            const riskEmoji = { low: '🟢', medium: '🟡', high: '🔴' }[risk.level] || '⚪';
            const evidence = (s.evidence || []).map(e =>
              `  - \`${e.location}\` — ${e.claim}`
            ).join('\n');

            const body = [
              `##  DevMind Analysis`,
              ``,
              `**${riskEmoji} Risk: ${(risk.level || 'unknown').toUpperCase()}** — ${risk.reason || ''}`,
              ``,
              `**What:** ${s.what || ''}`,
              `**Why:** ${s.why || ''}`,
              `**Impact:** ${s.impact || ''}`,
              ``,
              `**Review focus:** ${s.review_focus || ''}`,
              ``,
              evidence ? `**Evidence:**\n${evidence}` : '',
            ].filter(Boolean).join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });