name: DevMind PR Analysis
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Analyze PR with DevMind
        id: devmind
        run: |
          RESPONSE=$(curl -s -X POST "${{ secrets.DEVMIND_API_URL }}/analyze-pr" \
            -H "Content-Type: application/json" \
            -H "X-Api-Key: ${{ secrets.DEVMIND_API_KEY }}" \
            -d "{\"repo\": \"${{ github.repository }}\", \"pr_number\": ${{ github.event.pull_request.number }}}")
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT
      - name: Post comment
        uses: actions/github-script@v7
        with:
          script: |
            const raw = `${{ steps.devmind.outputs.response }}`;
            const data = JSON.parse(raw);
            const s = data.summary;
            const risk = s.risk || {};
            const re = data.risk_engine || {};
            const riskEmoji = { low: '🟢', medium: '🟡', high: '🔴', critical: '🟣' }[risk.level] || '⚪';
            const vulns = (s.vulnerabilities || []).map(v =>
              `> **${v.severity.toUpperCase()}** \`${v.location}\`\n> ${v.description}\n> **Fix:** ${v.fix}`
            ).join('\n\n');
            const factors = (re.top_factors || []).map(f => `- ${f}`).join('\n');
            const body = [
              `## 🤖 DevMind Analysis`,
              ``,
              `### ${riskEmoji} Risk: ${(risk.level || 'unknown').toUpperCase()}`,
              `${risk.reason || ''}`,
              ``,
              `**What:** ${s.what || ''}`,
              `**Why:** ${s.why || ''}`,
              `**Review focus:** ${s.review_focus || ''}`,
              ``,
              vulns ? `### 🚨 Vulnerabilities\n\n${vulns}` : '',
              ``,
              re.score ? `### 📊 Risk Score: ${re.score}/100 — ${re.label}\n${factors}` : '',
              ``,
              `---`,
              `*Generated by [DevMind](https://devmind-gamma.vercel.app) — AI-powered PR risk engine*`,
            ].filter(Boolean).join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });